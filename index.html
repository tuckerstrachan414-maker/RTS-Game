<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c2026">
<title>Nations — an RTS of trade and war</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  html, body { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; background: #1c2026;
    font-family: 'Segoe UI', system-ui, sans-serif; color: #dde; user-select: none;
    -webkit-touch-callout: none; overscroll-behavior: none; touch-action: none; }
  canvas#game { display: block; image-rendering: pixelated; cursor: crosshair; touch-action: none; }
  #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #9ab; text-align: center; padding: 0 20px; }

  .hud { position: absolute; background: rgba(20,24,30,0.88); border: 1px solid #3a4250; border-radius: 6px; }

  /* Pixel-art icon sprites (assets/icons16x16.png, 7x4 grid) — replace emoji glyphs everywhere.
     Sized in em so each usage inherits the icon size from its surrounding font-size. */
  .icon { display: inline-block; width: 1em; height: 1em; vertical-align: -0.15em;
    background-image: url('assets/icons16x16.png'); background-repeat: no-repeat; background-size: 700% 400%;
    image-rendering: pixelated; }
  .icon-food     { background-position: 0%       0%; }
  .icon-wood     { background-position: 16.6667% 0%; }
  .icon-stone    { background-position: 33.3333% 0%; }
  .icon-gold     { background-position: 50%      0%; }
  .icon-pop      { background-position: 66.6667% 0%; }
  .icon-idle     { background-position: 83.3333% 0%; }
  .icon-heart    { background-position: 100%     0%; }
  .icon-happy    { background-position: 0%       33.3333%; }
  .icon-neutral  { background-position: 16.6667% 33.3333%; }
  .icon-angry    { background-position: 33.3333% 33.3333%; }
  .icon-wilted   { background-position: 50%      33.3333%; }
  .icon-tax      { background-position: 66.6667% 33.3333%; }
  .icon-lock     { background-position: 83.3333% 33.3333%; }
  .icon-upgrade  { background-position: 100%     33.3333%; }
  .icon-crown    { background-position: 0%       66.6667%; }
  .icon-sword    { background-position: 16.6667% 66.6667%; }
  .icon-horse    { background-position: 33.3333% 66.6667%; }
  .icon-handshake{ background-position: 50%      66.6667%; }
  .icon-skull    { background-position: 66.6667% 66.6667%; }
  .icon-gift     { background-position: 83.3333% 66.6667%; }
  .icon-dove     { background-position: 100%     66.6667%; }
  .icon-noentry  { background-position: 0%       100%; }
  .icon-shield   { background-position: 16.6667% 100%; }
  .icon-speed    { background-position: 33.3333% 100%; }
  .icon-hide     { background-position: 50%      100%; }
  .icon-show     { background-position: 66.6667% 100%; }
  .icon-mobile   { background-position: 83.3333% 100%; }
  .icon-trophy   { background-position: 100%     100%; }

  #topbar { top: calc(8px + env(safe-area-inset-top)); left: calc(8px + env(safe-area-inset-left));
    right: calc(16px + env(safe-area-inset-right) + var(--sidebar-w, 0px)); padding: 6px 14px;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; align-items: center; font-size: 15px; }
  #topbar .stat { white-space: nowrap; }
  #topbar .stat[data-tip] { cursor: pointer; }
  #topbar .stat b { color: #fff; }
  #topbar .good { color: #7d7; } .bad { color: #f77 !important; }
  #tax { width: 70px; vertical-align: middle; touch-action: manipulation; }

  /* Small per-panel show/hide toggle — every collapsible HUD block gets one, independent of
     the global Hide UI button. Collapsed panels shrink to just this tab so they stay easy to find. */
  .collapse-btn { background: transparent; border: 1px solid #46536a; border-radius: 4px; color: #9ab;
    font-size: 12px; line-height: 1; padding: 4px 7px; cursor: pointer; touch-action: manipulation;
    transition: transform 0.15s; flex: 0 0 auto; }
  .collapse-btn:hover { background: #3a4658; color: #cde; }
  #minimap-wrap .collapse-btn { align-self: flex-end; }
  .collapsible.collapsed { padding: 4px !important; gap: 0 !important; }
  .collapsible.collapsed > *:not(.collapse-btn) { display: none !important; }
  .collapsible.collapsed .collapse-btn { transform: rotate(180deg); }

  #buildbar { bottom: calc(8px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); padding: 6px;
    display: flex; align-items: center; gap: 4px; max-width: 96vw; overflow-x: auto; -webkit-overflow-scrolling: touch; touch-action: pan-x; }
  .bbtn { background: #2c3442; color: #cde; border: 1px solid #46536a; border-radius: 4px;
    padding: 4px 7px; cursor: pointer; font-size: 12px; display: flex; flex-direction: column; align-items: center;
    touch-action: manipulation; flex: 0 0 auto; }
  .bbtn:hover { background: #3a4658; }
  .bbtn span { font-size: 10px; color: #9ab; }

  #panel { bottom: calc(var(--buildbar-h, 70px) + 16px + env(safe-area-inset-bottom));
    left: calc(8px + env(safe-area-inset-left)); padding: 10px; width: 300px; display: none;
    font-size: 13px; max-height: 60vh; overflow-y: auto; touch-action: pan-y; }
  #panel h3 { margin-bottom: 4px; font-size: 15px; }
  #panel .desc { color: #9ab; margin: 4px 0; }
  #panel .dim { color: #789; font-size: 11px; margin-top: 4px; }
  #panel .good { color: #7d7; }
  #panel button { background: #2c3442; color: #cde; border: 1px solid #46536a; border-radius: 3px;
    padding: 2px 7px; cursor: pointer; margin: 1px; touch-action: manipulation; }
  #panel button:hover { background: #3a4658; }
  #panel .workers { margin-top: 6px; }
  .trainrow { display: flex; flex-wrap: wrap; margin-top: 6px; }
  .tbtn { font-size: 11px; }
  .market { margin-top: 6px; border-top: 1px solid #3a4250; padding-top: 5px; }
  .mrow { display: flex; align-items: center; gap: 4px; margin: 2px 0; font-size: 12px; }
  .mrow button { margin-left: auto; font-size: 11px; }
  .mrow button + button { margin-left: 4px; }
  .brow { display: flex; flex-wrap: wrap; gap: 3px; }
  .brow button { font-size: 13px; padding: 3px 6px; }

  #tooltip { display: none; top: calc(var(--topbar-h, 54px) + 8px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    width: min(340px, 92vw); padding: 10px; font-size: 13px; z-index: 5; }
  #tooltip h3 { font-size: 14px; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 8px; }
  #tooltip .desc { color: #9ab; margin: 4px 0; }
  #tooltip .dim { color: #789; font-size: 11px; margin-top: 5px; }
  #tooltip .good { color: #7d7; }
  #tooltip .row { display: flex; justify-content: space-between; margin: 1px 0; gap: 10px; }
  #tooltip button { background: #2c3442; color: #cde; border: 1px solid #46536a; border-radius: 3px;
    padding: 1px 8px; cursor: pointer; touch-action: manipulation; }

  .tbtn.locked { opacity: 0.45; }

  #ui-show { display: none; position: absolute; top: calc(8px + env(safe-area-inset-top));
    right: calc(8px + env(safe-area-inset-right)); background: rgba(20,24,30,0.55); border: 1px solid #3a4250;
    border-radius: 6px; color: #cde; font-size: 18px; padding: 8px 13px; cursor: pointer; touch-action: manipulation; }
  body.ui-hidden #topbar, body.ui-hidden #buildbar, body.ui-hidden #menu-btn, body.ui-hidden #minimap-wrap, body.ui-hidden #panel,
  body.ui-hidden #diplomacy, body.ui-hidden #log, body.ui-hidden #tooltip, body.ui-hidden #cancel-place, body.ui-hidden #rotate-place,
  body.ui-hidden #eventcard { display: none !important; }
  body.ui-hidden #ui-show { display: block; }

  #log { position: absolute; left: calc(8px + env(safe-area-inset-left)); top: calc(var(--topbar-h, 54px) + 10px + env(safe-area-inset-top));
    right: calc(16px + env(safe-area-inset-right) + var(--sidebar-w, 0px)); max-width: 360px; pointer-events: none; }
  .msg { background: rgba(20,24,30,0.8); border-left: 3px solid #567; padding: 3px 8px; margin-bottom: 3px;
    font-size: 13px; border-radius: 0 4px 4px 0; transition: opacity 1.2s; }
  .msg.good { border-color: #5a5; } .msg.bad { border-color: #a55; }
  .msg.fade { opacity: 0; }

  /* The Menu button (opens the pause menu) and the minimap are two independent blocks in the
     top-right stack. */
  #sidebar { position: absolute; top: calc(8px + env(safe-area-inset-top)); right: calc(8px + env(safe-area-inset-right));
    display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
  /* override .hud's position:absolute — the minimap must stay in #sidebar's flex flow */
  #minimap-wrap { position: static; }
  #menu-btn { background: rgba(20,24,30,0.88); color: #cde; border: 1px solid #46536a; border-radius: 6px;
    padding: 8px 12px; cursor: pointer; font-size: 14px; touch-action: manipulation; align-self: stretch; }
  #menu-btn:hover { background: #3a4658; }
  #minimap-wrap { padding: 6px; display: flex; flex-direction: column; gap: 6px; }
  #minimap { border: 1px solid #46536a; border-radius: 4px; width: 172px; height: 172px; image-rendering: pixelated;
    cursor: pointer; touch-action: none; display: block; }

  #cancel-place { display: none; top: calc(8px + env(safe-area-inset-top)); left: calc(8px + env(safe-area-inset-left));
    padding: 8px 14px; font-size: 14px; color: #fda; cursor: pointer; touch-action: manipulation; }
  #rotate-place { display: none; top: calc(8px + env(safe-area-inset-top));
    left: calc(112px + env(safe-area-inset-left)); padding: 8px 14px; font-size: 14px; color: #ad9; cursor: pointer;
    touch-action: manipulation; }

  /* Event cards: AI-initiated proposals/ultimatums/disputes with response buttons.
     Non-pausing; a thin timer bar drains toward expiry. */
  #eventcard { display: none; top: calc(var(--topbar-h, 54px) + 8px + env(safe-area-inset-top));
    right: calc(var(--sidebar-w, 190px) + 16px); width: 310px; padding: 10px; font-size: 13px; z-index: 6; }
  #eventcard .ehead { margin-bottom: 4px; }
  #eventcard .ehead .dim { color: #789; font-size: 11px; }
  #eventcard .ebody { color: #bcd; margin-bottom: 8px; line-height: 1.35; }
  #eventcard .ebtns { display: flex; flex-wrap: wrap; gap: 4px; }
  #eventcard button { background: #2c3442; color: #cde; border: 1px solid #46536a; border-radius: 3px;
    padding: 4px 9px; cursor: pointer; font-size: 12px; touch-action: manipulation; }
  #eventcard button:hover { background: #3a4658; }
  #eventcard button.good { border-color: #5a5; }
  #eventcard button.bad { border-color: #a55; }
  #eventcard .etimer { height: 3px; background: #222831; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  #eventcard .etfill { height: 100%; background: #cba55a; }

  #diplomacy { display: none; top: calc(var(--topbar-h, 54px) + 6px); right: calc(var(--sidebar-w, 190px) + 16px);
    width: 360px; padding: 12px; font-size: 13px; max-height: 80vh; overflow-y: auto; touch-action: pan-y; }
  #diplomacy h2 { font-size: 17px; margin-bottom: 8px; display: flex; justify-content: space-between; }
  #diplomacy .nation { border-top: 1px solid #3a4250; padding: 8px 0; }
  #diplomacy .nation.dead { opacity: 0.45; }
  #diplomacy .nhead { margin-bottom: 4px; }
  #diplomacy .dim { color: #789; font-size: 11px; }
  #diplomacy button { background: #2c3442; color: #cde; border: 1px solid #46536a; border-radius: 3px;
    padding: 3px 7px; cursor: pointer; margin: 2px 2px 0 0; font-size: 12px; touch-action: manipulation; }
  #diplomacy button:hover { background: #3a4658; }
  .relbar { height: 6px; background: #222831; border-radius: 3px; overflow: hidden; margin: 3px 0; }
  .relfill { height: 100%; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 2px; }

  /* Pause menu: dims the frozen battlefield and floats a centered menu box. */
  #pause-menu { display: none; position: absolute; inset: 0; background: rgba(8,10,14,0.55);
    align-items: center; justify-content: center; z-index: 20; touch-action: none; }
  #pause-menu.open { display: flex; }
  #pause-menu .menu-box { background: rgba(22,26,32,0.98); border: 1px solid #46536a; border-radius: 10px;
    padding: 20px 22px; display: flex; flex-direction: column; gap: 8px; min-width: 240px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  #pause-menu h2 { font-size: 22px; text-align: center; }
  #pause-menu .menu-sub { text-align: center; color: #89a; font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 6px; }
  #pause-menu button { background: #2c3442; color: #cde; border: 1px solid #46536a; border-radius: 6px;
    padding: 11px 14px; cursor: pointer; font-size: 15px; text-align: left; touch-action: manipulation; }
  #pause-menu button:hover { background: #3a4658; }
  #resume-btn { background: #35507a; border-color: #4d6da0; }
  #resume-btn:hover { background: #416394; }

  /* Pre-game difficulty screen: shown before the Game is even constructed. Not .hud —
     it exists outside the running game, like #gameover. */
  #difficulty { display: none; position: absolute; inset: 0; background: rgba(10,12,16,0.92);
    flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    text-align: center; padding: 20px; z-index: 30; }
  #difficulty h1 { font-size: 38px; }
  #difficulty .sub { color: #9ab; font-size: 15px; max-width: 480px; }
  #difficulty button { background: #232a36; color: #cde; border: 1px solid #46536a; border-radius: 8px;
    padding: 12px 16px; cursor: pointer; font-size: 16px; width: min(480px, 92vw); text-align: left;
    touch-action: manipulation; }
  #difficulty button:hover { background: #3a4658; }
  #difficulty button b { display: block; font-size: 17px; margin-bottom: 3px; }
  #difficulty .diff-desc { font-size: 12.5px; color: #9ab; line-height: 1.4; }

  #gameover { display: none; position: absolute; inset: 0; background: rgba(10,12,16,0.85);
    flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center;
    padding: 20px; }
  #gameover h1 { font-size: 44px; }
  #gameover p { max-width: 520px; font-size: 17px; color: #bcd; line-height: 1.5; }
  #gameover button { background: #2c3442; color: #cde; border: 1px solid #46536a; border-radius: 6px;
    padding: 10px 22px; cursor: pointer; font-size: 16px; touch-action: manipulation; }

  #rotate-prompt { display: none; position: fixed; inset: 0; z-index: 999; background: #1c2026;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 24px; }
  #rotate-prompt .icon { font-size: 56px; animation: rot 1.6s ease-in-out infinite; }
  #rotate-prompt p { font-size: 18px; color: #cde; max-width: 300px; }
  @keyframes rot { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }

  /* Touch devices: bigger tap targets, compact HUD to fit a short landscape phone screen */
  @media (pointer: coarse) {
    #topbar { font-size: 13px; gap: 8px; padding: 5px 10px; }
    .bbtn { padding: 7px 9px; font-size: 12px; min-height: 40px; }
    .bbtn span { font-size: 10px; }
    .collapse-btn { padding: 6px 9px; min-height: 32px; min-width: 32px; }
    #menu-btn { padding: 10px 12px; font-size: 14px; min-height: 40px; }
    #pause-menu button { padding: 13px 16px; min-height: 44px; }
    #minimap { width: 120px; height: 120px; }
    #panel { width: min(280px, 62vw); font-size: 12px; bottom: calc(var(--buildbar-h, 62px) + 10px + env(safe-area-inset-bottom)); }
    #panel button, .tbtn { padding: 6px 9px; min-height: 32px; }
    #diplomacy { top: 50%; left: 50%; right: auto; transform: translate(-50%, -50%);
      width: min(94vw, 420px); max-height: 88vh; }
    #diplomacy button { padding: 7px 10px; min-height: 34px; }
    #log { max-width: 60vw; }
  }

  #rotate-prompt button { background: #2c3442; color: #cde; border: 1px solid #46536a; border-radius: 6px;
    padding: 10px 20px; cursor: pointer; font-size: 15px; touch-action: manipulation; }
  #rotate-prompt .hint { font-size: 13px; color: #789; }

  /* Portrait on a phone: suggest landscape, but let the player dismiss and play anyway. */
  @media (orientation: portrait) and (pointer: coarse) {
    body:not(.force-play) #game,
    body:not(.force-play) #loading,
    body:not(.force-play) #log,
    body:not(.force-play) #gameover,
    body:not(.force-play) #difficulty,
    body:not(.force-play) .hud { display: none !important; }
    body:not(.force-play) #rotate-prompt { display: flex; }
  }
</style>
</head>
<body>
<div id="rotate-prompt">
  <span class="icon icon-mobile"></span>
  <p>This game plays best in landscape.</p>
  <button id="play-portrait">Play in portrait anyway</button>
  <span class="hint">Rotate your device for the full view.</span>
</div>

<canvas id="game"></canvas>
<div id="loading">Loading assets…</div>

<div id="topbar" class="hud collapsible">
  <span class="stat" data-tip="food"><span class="icon icon-food"></span> <b id="r-food">0</b></span>
  <span class="stat" data-tip="wood"><span class="icon icon-wood"></span> <b id="r-wood">0</b></span>
  <span class="stat" data-tip="stone"><span class="icon icon-stone"></span> <b id="r-stone">0</b></span>
  <span class="stat" data-tip="gold"><span class="icon icon-gold"></span> <b id="r-gold">0</b></span>
  <span class="stat" data-tip="pop" title="Population / housing"><span class="icon icon-pop"></span> <b id="r-pop">0/0</b></span>
  <span class="stat" data-tip="idle" title="Idle citizens available for work"><span class="icon icon-idle"></span> <b id="r-idle">0</b></span>
  <span class="stat" data-tip="happy" title="Happiness"><span class="icon icon-heart"></span> <b id="r-happy">0%</b></span>
  <span class="stat" title="Day/night cycle — population grows by 30% of housing capacity each dawn"><b id="r-daynight">Day 1 ☀</b></span>
  <span class="stat" title="Taxes: gold from citizens at the cost of happiness"><span class="icon icon-tax"></span> <input type="range" id="tax" min="0" max="40" value="10"> <b id="taxval">10%</b></span>
  <button class="collapse-btn" title="Hide resource bar">▾</button>
</div>

<div id="sidebar">
  <button id="menu-btn" title="Menu / Pause (Esc)"><span class="icon icon-speed"></span> Menu</button>
  <div id="minimap-wrap" class="hud collapsible">
    <button class="collapse-btn" title="Hide map">▾</button>
    <canvas id="minimap" width="172" height="172"></canvas>
  </div>
</div>
<button id="ui-show" title="Show the interface (H)"><span class="icon icon-show"></span></button>
<div id="tooltip" class="hud"></div>

<button id="cancel-place" class="hud">✕ Cancel</button>
<button id="rotate-place" class="hud" title="Rotate the bridge (R)">⟳ Rotate</button>
<div id="diplomacy" class="hud"></div>
<div id="eventcard" class="hud"></div>
<div id="panel" class="hud"></div>
<div id="buildbar" class="hud collapsible"></div>
<div id="log"></div>

<div id="gameover">
  <h1></h1>
  <p></p>
  <button onclick="location.reload()">Play again</button>
</div>

<div id="difficulty">
  <h1><span class="icon icon-crown"></span> Nations</h1>
  <p class="sub">Rival nations pursue their own ambitions — conquest, riches, walls or webs of alliances. Choose how hard they come at you.</p>
  <button data-diff="ramped"><b>Measured March</b><span class="diff-desc"></span></button>
  <button data-diff="slanted"><b>Quiet Frontier</b><span class="diff-desc"></span></button>
  <button data-diff="ruthless"><b>Iron Age</b><span class="diff-desc"></span></button>
</div>

<div id="pause-menu">
  <div class="menu-box">
    <h2><span class="icon icon-crown"></span> Nations</h2>
    <div class="menu-sub">Paused</div>
    <button id="resume-btn"><span class="icon icon-show"></span> Resume</button>
    <button id="pm-diplo"><span class="icon icon-dove"></span> Diplomacy</button>
    <button id="pm-army"><span class="icon icon-shield"></span> Select Army</button>
    <button id="pm-speed"><span class="icon icon-speed"></span> Speed: <span id="speed-val">1x</span></button>
    <button id="pm-hide"><span class="icon icon-hide"></span> Hide UI</button>
    <button id="pm-restart" title="Abandon this game and start a new one">↺ New Game</button>
  </div>
</div>

<script src="js/assets.js"></script>
<script src="js/map.js"></script>
<script src="js/buildings.js"></script>
<script src="js/economy.js"></script>
<script src="js/market.js"></script>
<script src="js/units.js"></script>
<script src="js/factions.js"></script>
<script src="js/diplomacy.js"></script>
<script src="js/events.js"></script>
<script src="js/ai.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
